name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.12'
  PNPM_VERSION: '9.15.0'

jobs:
  check:
    # Static checks only — no DB or Redis needed. We use `prisma db push` in
    # production, not interactive migrations, so CI doesn't need a Postgres.
    name: typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @converflow/db generate

      - name: Build shared packages
        run: |
          pnpm --filter @converflow/shared build
          pnpm --filter @converflow/db build

      - name: Typecheck
        run: pnpm typecheck

      - name: Build apps
        run: pnpm build
