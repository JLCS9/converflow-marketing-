name: Build & push images (manual)

# This workflow pushes Docker images to GHCR. We currently DON'T use those
# images — the VPS builds locally via `docker compose build`. Kept here as
# manual trigger so we can flip to image-pull deploys later without
# re-writing the workflow. Removed from `push` triggers to stop the email
# spam from automatic runs.

on:
  workflow_dispatch:
  # Re-enable when we want CI/CD to GHCR:
  # push:
  #   branches: [main]
  #   tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web, workers, bot-runner]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/converflow-${{ matrix.app }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.app }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
