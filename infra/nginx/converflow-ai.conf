# =====================================================================
# Nginx vhost for converflow.ai (host-level, NOT inside Docker)
#
# Drop this at /etc/nginx/sites-available/converflow-ai.conf on the VPS
# and symlink it from /etc/nginx/sites-enabled/.
#
# Then issue TLS certificates with certbot:
#   certbot --nginx -d converflow.ai -d www.converflow.ai \
#                   -d app.converflow.ai -d admin.converflow.ai \
#                   -d api.converflow.ai
#
# Certbot will inject the SSL blocks automatically.
# =====================================================================

# Marketing/landing (root domain) → same Next.js web container
server {
    listen 80;
    listen [::]:80;
    server_name converflow.ai www.converflow.ai;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# Tenant dashboard
server {
    listen 80;
    listen [::]:80;
    server_name app.converflow.ai;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# Super admin dashboard (same web container, different host → different routes)
server {
    listen 80;
    listen [::]:80;
    server_name admin.converflow.ai;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Optional: restrict by IP allowlist. Uncomment + add your IPs.
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# API (NestJS)
server {
    listen 80;
    listen [::]:80;
    server_name api.converflow.ai;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Limit request body size for OCR uploads etc.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # SSE for bot QR streams — keep alive long
        proxy_read_timeout 600s;
        proxy_buffering off;
    }
}
